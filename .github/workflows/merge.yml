name: Separate VPN Subscriptions
on:
  schedule:
    - cron: '0 * * * *' # Запуск каждый час
  workflow_dispatch: # Кнопка для ручного запуска

# Защита от столкновения роботов (от Copilot)
concurrency:
  group: merge-configs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch and Merge Links
        run: |
          # Файл 1: Первые 3 ссылки
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt" > black.txt
          echo "" >> black.txt
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt" >> black.txt
          echo "" >> black.txt
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt" >> black.txt
          
          # Файл 2: Оставшиеся 2 ссылки
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-checked.txt" > white.txt
          echo "" >> white.txt
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-SNI-RU-all.txt" >> white.txt

      - name: Push updates to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add black.txt white.txt
          git commit -m "Update subscriptions" || echo "No changes"
          git pull --rebase origin main # Безопасное слияние (от Copilot)
          git push
