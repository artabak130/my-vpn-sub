name: Separate VPN Subscriptions
on:
  schedule:
    - cron: '0 * * * *' # Автозапуск каждый час
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch and Merge Links
        run: |
          # Файл 1: Оставляем старые 3 ссылки
          curl -s "https://githubusercontent.com" > configs.txt
          echo "" >> configs.txt
          curl -s "https://githubusercontent.com" >> configs.txt
          echo "" >> configs.txt
          curl -s "https://githubusercontent.com" >> configs.txt
          
          # Файл 2: Запихиваем новые 5 ссылок
          curl -s "https://githubusercontent.com" > configs2.txt
          echo "" >> configs2.txt
          curl -s "https://githubusercontent.com" >> configs2.txt
          echo "" >> configs2.txt
          curl -s "https://githubusercontent.com" >> configs2.txt
          echo "" >> configs2.txt
          curl -s "https://githubusercontent.com" >> configs2.txt
          echo "" >> configs2.txt
          curl -s "https://githubusercontent.com" >> configs2.txt

      - name: Push updates to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add configs.txt configs2.txt
          git commit -m "Update subscriptions" || echo "No changes to commit"
          git push
